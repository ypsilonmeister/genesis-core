# =============================================================================
# chain.toml — モジュール呼び出しチェーン定義
#
# 起動時に orchestrator が読み込む。
# Tier 2 で AI が新モジュールを追加するときはこのファイルを書き換える。
# 手動編集も可だが、Tier 3 (人間承認) として扱う。
#
# 順序が重要: 上から下へ順番に呼ばれる。
# socket は Unix Domain Socket のパス (Phase 1)。
# =============================================================================

[[modules]]
name = "normalizer"
binary = "target/debug/normalizer"
socket = "/tmp/genesis-core/normalizer.sock"

[[modules]]
name = "tokenizer"
binary = "target/debug/tokenizer"
socket = "/tmp/genesis-core/tokenizer.sock"

[[modules]]
name = "parser"
binary = "target/debug/parser"
socket = "/tmp/genesis-core/parser.sock"

[[modules]]
name = "evaluator"
binary = "target/debug/evaluator"
socket = "/tmp/genesis-core/evaluator.sock"
